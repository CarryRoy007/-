<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>战国策·抉择</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="start-screen">
    <h1 class="game-title">战国策</h1>
    <p class="game-subtitle">抉 择</p>
    <div class="start-buttons">
      <button id="btn-new-game" class="btn-primary">开始新游戏</button>
      <button id="btn-continue" class="btn-secondary" style="display:none">继续游戏</button>
    </div>
    <div id="era-select" style="display:none">
      <h2>选择纪元</h2>
      <div id="era-list"></div>
    </div>
    <div id="country-select" style="display:none">
      <h2>选择国家</h2>
      <div id="country-list"></div>
    </div>
  </div>

  <div id="game-screen">
    <header id="game-header">
      <div class="header-left">
        <span id="header-country"></span>
        <span id="header-year"></span>
        <span id="header-season"></span>
      </div>
      <div id="world-notify" style="display:none"></div>
      <div class="header-right">
        <span id="header-health"></span>
        <span id="header-turn"></span>
        <span id="header-cities"></span>
      </div>
    </header>

    <div id="map-area">
      <div id="map-container"></div>
    </div>

    <aside id="side-panel">
      <div class="panel-section">
        <div class="panel-title">国力</div>
        <div id="stats-panel"></div>
      </div>
      <div class="panel-section">
        <div class="panel-title">在朝人物</div>
        <div id="characters-panel"></div>
      </div>
      <div class="panel-section">
        <div class="panel-title">外交关系</div>
        <div id="diplomacy-panel"></div>
      </div>
    </aside>

    <div id="event-area">
      <div id="event-panel">
        <h2 id="event-title"></h2>
        <div id="event-text"></div>
        <div id="event-choices"></div>
      </div>
      <div id="outcome-panel" style="display:none">
        <div class="outcome-verdict">
          <span id="outcome-verdict-text"></span>
        </div>
        <div class="outcome-scroll">
          <div class="scroll-label">史官记述</div>
          <div id="outcome-chronicle"></div>
          <div id="outcome-stats"></div>
          <div id="outcome-territory"></div>
          <div id="outcome-fate"></div>
        </div>
        <button id="outcome-continue" class="btn-primary btn-continue" onclick="Engine.onContinue()">史笔留此，君王珍重</button>
      </div>
    </div>
  </div>

  <div id="end-screen">
    <div id="end-content"></div>
  </div>

  <div id="chronicle-modal">
    <div id="chronicle-inner">
      <div id="chronicle-header">
        <h2>史书回放</h2>
        <button id="chronicle-close" onclick="UI.hideChronicle()">&times;</button>
      </div>
      <div id="chronicle-content"></div>
    </div>
  </div>

  <script src="js/countries.js"></script>
  <script src="js/characters.js"></script>
  <script src="js/events.js"></script>
  <script src="js/state.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/map.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/epitaph.js"></script>
  <script src="js/chronicle.js"></script>
  <script src="js/save.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
